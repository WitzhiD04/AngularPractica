<h1>{{ title() }}</h1>
<header>
    <div class="toolbar">
        <a href="https://www.google.com">Google</a>

        <ng-container [ngSwitch]="userType">
            <ng-container *ngSwitchCase="'user'">
                <a routerLink="/home" class="btn btn-secondary">Acciones basicas</a>
            </ng-container>

            <ng-container *ngSwitchCase="'prof'">
                <a routerLink="/home" class="btn btn-secondary">Acciones Profes</a>
            </ng-container>

            <ng-container *ngSwitchCase="'admin'">
                <a routerLink="/home" class="btn btn-secondary">Acciones basicas</a>
                <a routerLink="/home" class="btn btn-secondary">Acciones Profes</a>
                <a routerLink="/admin" class="btn btn-secondary">Acciones Administrador</a>
            </ng-container>
        </ng-container>
    </div>
</header>

<main>
    <router-outlet></router-outlet>
</main>
