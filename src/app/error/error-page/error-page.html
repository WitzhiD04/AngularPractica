<div class="error-container">
    <div class="error-content">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h1 class="error-title">¡Ups! Algo salió mal</h1>
        <p class="error-message">
            La página que estás buscando no existe o ha ocurrido un error inesperado al procesar tu solicitud.
        </p>
        
        <div class="error-actions">
            <a routerLink="/home" class="btn-return">
                <i class="bi bi-house-door-fill"></i>
                Volver al Inicio
            </a>
            <button class="btn-support" onclick="window.history.back()">
                <i class="bi bi-arrow-left"></i>
                Regresar
            </button>
        </div>
    </div>
    
    <div class="background-decorations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
</div>
